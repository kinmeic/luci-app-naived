name: Build OpenWrt 24.10 Packages

on:
  workflow_dispatch:
    inputs:
      make_jobs:
        description: Build parallelism. Supports auto, 4, or -j4.
        required: false
        default: auto
      publish_release:
        description: Publish build artifacts to a GitHub release.
        required: false
        type: boolean
        default: false
      release_tag:
        description: Release tag to create or update when publish_release is enabled.
        required: false
        default: ""
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: openwrt-24.10-x86-64
            sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            target_label: x86_64
          - artifact_name: openwrt-24.10-aarch64-cortex-a53
            sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/rockchip/armv8/openwrt-sdk-24.10.0-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            target_label: aarch64_cortex-a53

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve build parallelism
        id: jobs
        shell: bash
        run: |
          input="${{ github.event.inputs.make_jobs || 'auto' }}"
          if [ -z "$input" ] || [ "$input" = "auto" ]; then
            echo "value=-j$(nproc)" >> "$GITHUB_OUTPUT"
          elif [[ "$input" =~ ^-j[0-9]+$ ]]; then
            echo "value=$input" >> "$GITHUB_OUTPUT"
          elif [[ "$input" =~ ^[0-9]+$ ]]; then
            echo "value=-j$input" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported make_jobs input: $input" >&2
            exit 1
          fi

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            file \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3 \
            python3-pyelftools \
            python3-setuptools \
            rsync \
            tar \
            unzip \
            wget \
            zlib1g-dev \
            zstd

      - name: Download and extract OpenWrt SDK
        run: |
          mkdir -p "$RUNNER_TEMP/sdk"
          wget -qO "$RUNNER_TEMP/openwrt-sdk.tar.zst" "${{ matrix.sdk_url }}"
          tar --zstd -xf "$RUNNER_TEMP/openwrt-sdk.tar.zst" -C "$RUNNER_TEMP/sdk" --strip-components=1

      - name: Configure feeds
        working-directory: ${{ runner.temp }}/sdk
        run: |
          ./scripts/feeds update packages luci
          ./scripts/feeds install -a -p packages
          ./scripts/feeds install -a -p luci

      - name: Inject package into SDK
        working-directory: ${{ runner.temp }}/sdk
        run: |
          rm -rf package/luci-app-naived
          mkdir -p package/luci-app-naived
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'artifacts' \
            --exclude '.DS_Store' \
            "$GITHUB_WORKSPACE"/ package/luci-app-naived/

      - name: Configure package selection
        working-directory: ${{ runner.temp }}/sdk
        run: |
          cat >> .config <<'EOF'
          CONFIG_PACKAGE_luci-app-naived=y
          CONFIG_PACKAGE_luci-app-naived_Nftables_Transparent_Proxy=y
          CONFIG_PACKAGE_luci-app-naived_INCLUDE_ChinaDNS_NG=y
          CONFIG_PACKAGE_luci-app-naived_INCLUDE_DNSPROXY=y
          CONFIG_PACKAGE_luci-app-naived_INCLUDE_NaiveProxy=y
          EOF
          make defconfig

      - name: Build package
        working-directory: ${{ runner.temp }}/sdk
        run: |
          make package/luci-app-naived/compile ${{ steps.jobs.outputs.value }} V=s

      - name: Collect artifacts
        working-directory: ${{ runner.temp }}/sdk
        run: |
          mkdir -p "$GITHUB_WORKSPACE/artifacts/${{ matrix.target_label }}"
          find bin/packages -type f \( -name '*naived*.ipk' -o -name 'Packages*' \) \
            -exec cp -v {} "$GITHUB_WORKSPACE/artifacts/${{ matrix.target_label }}/" \;
          (
            cd "$GITHUB_WORKSPACE/artifacts/${{ matrix.target_label }}"
            sha256sum *.ipk > sha256sums.txt
          )

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.target_label }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-22.04
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.publish_release == 'true' &&
       github.event.inputs.release_tag != '')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release bundles
        shell: bash
        run: |
          mkdir -p release-bundles
          for dir in release-artifacts/*; do
            [ -d "$dir" ] || continue
            name="$(basename "$dir")"
            (
              cd release-artifacts
              zip -qr "../release-bundles/${name}.zip" "$name"
            )
          done
          (
            cd release-bundles
            sha256sum *.zip > sha256sums.txt
          )

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          tag="${{ steps.release_tag.outputs.value }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-bundles/* --clobber
          else
            gh release create "$tag" release-bundles/* \
              --title "$tag" \
              --notes "OpenWrt 24.10 package build artifacts."
          fi
