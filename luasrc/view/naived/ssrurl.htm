<%+cbi/valueheader%>
<%
local map = self.map
-%>
<script type="text/javascript">
//<![CDATA[
let ss_type = "ss-rust"

function padright(str, cnt, pad) {
	return str + Array(cnt + 1).join(pad);
}

function b64EncodeUnicode(str) {
	return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function (match, p1) {
		return String.fromCharCode('0x' + p1);
	}));
}

function b64encutf8safe(str) {
	return b64EncodeUnicode(str).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, '');
}

function b64DecodeUnicode(str) {
	return decodeURIComponent(Array.prototype.map.call(atob(str), function (c) {
		return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
	}).join(''));
}

function b64decutf8safe(str) {
	var l;
	str = str.replace(/-/g, "+").replace(/_/g, "/");
	l = str.length;
	l = (4 - l % 4) % 4;
	if (l) str = padright(str, l, "=");
	return b64DecodeUnicode(str);
}

function b64encsafe(str) {
	return btoa(str).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, '')
}

function b64decsafe(str) {
	var l;
	str = str.replace(/-/g, "+").replace(/_/g, "/");
	l = str.length;
	l = (4 - l % 4) % 4;
	if (l) str = padright(str, l, "=");
	return atob(str);
}

function dictvalue(d, key) {
	var v = d[key];
	if (typeof (v) == 'undefined' || v == '') return '';
	return b64decsafe(v);
}

function export_ssr_url(btn, urlname, sid) {
	var s = document.getElementById(urlname + '-status');
	if (!s) return false;
	var v_server = document.getElementsByName('cbid.naived.' + sid + '.server')[0];
	var v_port = document.getElementsByName('cbid.naived.' + sid + '.server_port')[0];
	var v_protocol = document.getElementsByName('cbid.naived.' + sid + '.protocol')[0];
	var v_method = document.getElementsByName('cbid.naived.' + sid + '.encrypt_method')[0];
	var v_obfs = document.getElementsByName('cbid.naived.' + sid + '.obfs')[0];
	var v_password = document.getElementsByName('cbid.naived.' + sid + '.password')[0];
	var v_obfs_param = document.getElementsByName('cbid.naived.' + sid + '.obfs_param')[0];
	var v_protocol_param = document.getElementsByName('cbid.naived.' + sid + '.protocol_param')[0];
	var v_alias = document.getElementsByName('cbid.naived.' + sid + '.alias')[0];
	var ssr_str = v_server.value + ":" + v_port.value + ":" + v_protocol.value + ":" + v_method.value + ":" + v_obfs.value + ":" + b64encsafe(v_password.value) + "/?obfsparam=" + b64encsafe(v_obfs_param.value) + "&protoparam=" + b64encsafe(v_protocol_param.value) + "&remarks=" + b64encutf8safe(v_alias.value);
	var textarea = document.createElement("textarea");
	textarea.textContent = "ssr://" + b64encsafe(ssr_str);
	textarea.style.position = "fixed";
	document.body.appendChild(textarea);
	textarea.select();
	try {
		document.execCommand("copy"); // Security exception may be thrown by some browsers.
		s.innerHTML = "<font style=\'color:green\'><%:Copy NaiveD to clipboard successfully.%></font>";
	} catch (ex) {
		s.innerHTML = "<font style=\'color:red\'><%:Unable to copy NaiveD to clipboard.%></font>";
	} finally {
		document.body.removeChild(textarea);
	}
	return false;
}

function import_ssr_url(btn, urlname, sid) {
		var s = document.getElementById(urlname + '-status');
		if (!s) return false;
		var ssrurl = prompt("<%:Paste sharing link here%>", "");
		if (ssrurl == null || ssrurl == "") {
			s.innerHTML = "<font style=\'color:red\'><%:User cancelled.%></font>";
			return false;
		}
		s.innerHTML = "";
		//var ssu = ssrurl.match(/ssr:\/\/([A-Za-z0-9_-]+)/i);
		ssrurl = ssrurl.replace(/&([a-zA-Z]+);/g, '&').replace(/\s*#\s*/, '#').trim();  //一些奇葩的链接用"&amp;"当做"&"，"#"前后带空格
		var ssu = ssrurl.split('://');
		//console.log(ssu.length);
		var event = document.createEvent("HTMLEvents");
		event.initEvent("change", true, true);
		switch (ssu[0]) {
		case "ss":
			var url0 = (ssu[1] || "");
			var param = "";

			// 先分离 #（alias）
			var hashIndex = url0.indexOf("#");
			if (hashIndex >= 0) {
				param = url0.substring(hashIndex + 1);
				url0 = url0.substring(0, hashIndex);
			}

			// 再分离 ? 或 /?（参数）
			var queryIndex = (url0 = url0.replace('/?', '?')).indexOf("?");
			var query = "";
			if (queryIndex >= 0) {
				query = url0.substring(queryIndex + 1);
				url0 = url0.substring(0, queryIndex);
			}

			var params = Object.fromEntries(new URLSearchParams(query));

			if ( ! params.type) {
				// 普通 SS 导入逻辑
				// 判断是否 SIP002 格式（即含 @）
				if (url0.indexOf("@") !== -1) {
					// === SIP002 格式 ===
					var sipIndex = url0.indexOf("@");
					// 先 URL 解码 base64 再解码
					var userInfoB64 = decodeURIComponent(url0.substring(0, sipIndex));
					var userInfo = b64decsafe(userInfoB64);
					var userInfoSplitIndex = userInfo.indexOf(":");
					if(userInfoSplitIndex < 0) {
						// 格式错误
						s.innerHTML = "<font style='color:red'><%:Userinfo format error.%></font>";
						break;
					}
					var method = userInfo.substring(0, userInfoSplitIndex);
					var password = userInfo.substring(userInfoSplitIndex + 1);
					var serverPart = url0.substring(sipIndex + 1);
					var serverInfo = serverPart.split(":");

					var server = serverInfo[0];
					var port = serverInfo[1];

					var plugin = "", pluginOpts = "";
					if (params.plugin) {
						var pluginParams = decodeURIComponent(params.plugin).split(";");
						plugin = pluginParams.shift();
						pluginOpts = pluginParams.join(";");
					}
				} else {
					// === Base64 SS2022 / 普通格式 的整体编码格式 ===
					// 先 URL 解码整个字符串
					var decodedUrl0 = decodeURIComponent(url0);
					var sstr = b64decsafe(decodedUrl0);
					if (!sstr) {
						s.innerHTML = "<font style='color:red'><%:Base64 sstr failed.%></font>";
						break;
					}

					// 支持 SS2022 / 普通格式
					var regex2022 = /^([^:]+):([^:]+):([^@]+)@([^:]+):(\d+)$/;
					var regexNormal = /^([^:]+):([^@]+)@([^:]+):(\d+)$/;

					var m2022 = sstr.match(regex2022);
					var mNormal = sstr.match(regexNormal);

					if (m2022) {
						var method = m2022[1];
						var password = m2022[2] + ":" + m2022[3];
						var server = m2022[4];
						var port = m2022[5];
					} else if (mNormal) {
						var method = mNormal[1];
						var password = mNormal[2];
						var server = mNormal[3];
						var port = mNormal[4];
					} else {
						s.innerHTML = "<font style='color:red'><%:SS URL base64 sstr format not recognized.%></font>";
						break;
					}

					var plugin = "", pluginOpts = "";
					if (params["shadow-tls"]) {
						try {
							var decoded_tls = JSON.parse(atob(decodeURIComponent(params["shadow-tls"])));
							plugin = "shadow-tls";
							var versionFlag = "";
							if (decoded_tls.version && !isNaN(decoded_tls.version)) {
                				versionFlag = "v" + decoded_tls.version + "=1;";
							}
							pluginOpts = versionFlag + "host=" + (decoded_tls.host || "") + ";passwd=" + (decoded_tls.password || "");
						} catch (e) {
							console.log("shadow-tls decode failed:", e);
						}
					}
				}

				// 判断密码是否经过url编码
				const isURLEncodedPassword = function(pwd) {
					if (!/%[0-9A-Fa-f]{2}/.test(pwd)) return false;
					try {
						const decoded = decodeURIComponent(pwd.replace(/\+/g, "%20"));
						const reencoded = encodeURIComponent(decoded);
						return reencoded === pwd;
					} catch (e) {
						return false;
					}
				}
				if (isURLEncodedPassword(password)) {
					password = decodeURIComponent(password); // 解码URL编码
				} else {
					password = password; // 保持原始值
				}

				// === 填充配置项 ===
				var has_ss_type = (ss_type === "ss-rust") ? "ss-rust" : "ss-libev";

				document.getElementsByName('cbid.naived.' + sid + '.type')[0].value = ssu[0];
				document.getElementsByName('cbid.naived.' + sid + '.type')[0].dispatchEvent(event);
				document.getElementsByName('cbid.naived.' + sid + '.has_ss_type')[0].value = has_ss_type;
				document.getElementsByName('cbid.naived.' + sid + '.has_ss_type')[0].dispatchEvent(event);
				document.getElementsByName('cbid.naived.' + sid + '.server')[0].value = server;
				document.getElementsByName('cbid.naived.' + sid + '.server_port')[0].value = port;
				document.getElementsByName('cbid.naived.' + sid + '.password')[0].value = password || "";
				document.getElementsByName('cbid.naived.' + sid + '.encrypt_method_ss')[0].value = method;
				document.getElementsByName('cbid.naived.' + sid + '.encrypt_method_ss')[0].dispatchEvent(event);

				if (plugin && plugin !== "none") {
					document.getElementsByName('cbid.naived.' + sid + '.enable_plugin')[0].checked = true; // 设置 enable_plugin 为 true
					document.getElementsByName('cbid.naived.' + sid + '.enable_plugin')[0].dispatchEvent(event); // 触发事件
					document.getElementsByName('cbid.naived.' + sid + '.plugin')[0].value = plugin;
					document.getElementsByName('cbid.naived.' + sid + '.plugin')[0].dispatchEvent(event);
					if (plugin !== undefined) {
						document.getElementsByName('cbid.naived.' + sid + '.plugin_opts')[0].value = pluginOpts || "";
					}
				} else {
					document.getElementsByName('cbid.naived.' + sid + '.enable_plugin')[0].checked = false;
				}

				if (params.tfo === "1") {
					document.getElementsByName('cbid.naived.' + sid + '.fast_open')[0].checked = true; // 设置 fast_open 为 true
					document.getElementsByName('cbid.naived.' + sid + '.fast_open')[0].dispatchEvent(event); // 触发事件
				}

				if (param != undefined) {
					document.getElementsByName('cbid.naived.' + sid + '.alias')[0].value = decodeURIComponent(param);
				}
				s.innerHTML = "<font style=\'color:green\'><%:Import configuration information successfully.%></font>";
				return false;
			} else {
				// Naiveproxy SS 导入逻辑
				try {
					// 拆分 @，判断是否是 base64 userinfo 的格式
					var parts = url0.split("@");
					if (parts.length > 1) {
						// @ 前是 base64(method:password)，后面是 server:port?params
						var userinfo = b64decsafe(parts[0]);
						var sepIndex = userinfo.indexOf(":");
						if (sepIndex > -1) {
							method = userinfo.slice(0, sepIndex);
							password = userinfo.slice(sepIndex + 1);  //一些链接用明文uuid做密码
						}
					}
					var url = new URL("http://" + url0 + (param ? "#" + encodeURIComponent(param) : ""));

				} catch(e) {
					alert(e);
					return false;
				}
				// Check if the elements exist before trying to modify them
				function setElementValue(name, value) {
					const element = document.getElementsByName(name)[0];
					if (element) {
						if (typeof value === 'boolean') {
							element.checked = value;
						} else {
							element.value = value;
						}
					}
				}
				function dispatchEventIfExists(name, event) {
					const element = document.getElementsByName(name)[0];
					if (element) {
						element.dispatchEvent(event);
					}
				}
				setElementValue('cbid.naived.' + sid + '.alias', url.hash ? decodeURIComponent(url.hash.slice(1)) : "");
				setElementValue('cbid.naived.' + sid + '.type', "ss");
				dispatchEventIfExists('cbid.naived.' + sid + '.type', event);
				setElementValue('cbid.naived.' + sid + '.server', url.hostname);
				setElementValue('cbid.naived.' + sid + '.server_port', url.port || "80");
				setElementValue('cbid.naived.' + sid + '.password', password || url.username);
				setElementValue('cbid.naived.' + sid + '.encrypt_method_ss', method || params.encryption || "none");
				s.innerHTML = "<font style=\'color:green\'><%:Import configuration information successfully.%></font>";
				return false;
			}
		case "ssr":
			var sstr = b64decsafe((ssu[1] || "").replace(/#.*/, "").trim());
			var ploc = sstr.indexOf("/?");
			document.getElementsByName('cbid.naived.' + sid + '.type')[0].value = ssu[0];
			document.getElementsByName('cbid.naived.' + sid + '.type')[0].dispatchEvent(event);
			var url0, param = "";
			if (ploc > 0) {
				url0 = sstr.substr(0, ploc);
				param = sstr.substr(ploc + 2);
			}
			var ssm = url0.match(/^(.+):([^:]+):([^:]*):([^:]+):([^:]*):([^:]+)/);
			if (!ssm || ssm.length < 7) return false;
			var pdict = {};
			if (param.length > 2) {
				var a = param.split('&');
				for (var i = 0; i < a.length; i++) {
					var b = a[i].split('=');
					pdict[decodeURIComponent(b[0])] = decodeURIComponent(b[1] || '');
				}
			}
			document.getElementsByName('cbid.naived.' + sid + '.server')[0].value = ssm[1];
			document.getElementsByName('cbid.naived.' + sid + '.server_port')[0].value = ssm[2];
			document.getElementsByName('cbid.naived.' + sid + '.protocol')[0].value = ssm[3];
			document.getElementsByName('cbid.naived.' + sid + '.encrypt_method')[0].value = ssm[4];
			document.getElementsByName('cbid.naived.' + sid + '.obfs')[0].value = ssm[5];
			document.getElementsByName('cbid.naived.' + sid + '.password')[0].value = b64decsafe(ssm[6]);
			document.getElementsByName('cbid.naived.' + sid + '.obfs_param')[0].value = dictvalue(pdict, 'obfsparam');
			document.getElementsByName('cbid.naived.' + sid + '.protocol_param')[0].value = dictvalue(pdict, 'protoparam');
			if (pdict.tfo === "1") {
				document.getElementsByName('cbid.naived.' + sid + '.fast_open')[0].checked = true; // 设置 fast_open 为 true
				document.getElementsByName('cbid.naived.' + sid + '.fast_open')[0].dispatchEvent(event); // 触发事件
			}
			var rem = pdict['remarks'];
			if (typeof (rem) != 'undefined' && rem != '' && rem.length > 0) document.getElementsByName('cbid.naived.' + sid + '.alias')[0].value = b64decutf8safe(rem);
			s.innerHTML = "<font style=\'color:green\'><%:Import configuration information successfully.%></font>";
			return false;
		case "naive":
		case "naiveproxy":
			var url0 = (ssu[1] || "");
			var param = "";

			// 先分离 #（alias）
			var hashIndex = url0.indexOf("#");
			if (hashIndex >= 0) {
				param = url0.substring(hashIndex + 1);
				url0 = url0.substring(0, hashIndex);
			}

			// URL decode
			url0 = decodeURIComponent(url0);

			// 解析 username:password@server:port
			var atIndex = url0.indexOf("@");
			if (atIndex < 0) {
				s.innerHTML = "<font style='color:red'><%:Invalid naiveproxy URL format.%></font>";
				return false;
			}

			var userInfo = url0.substring(0, atIndex);
			var serverPart = url0.substring(atIndex + 1);

			// 处理可能的 scheme (https://)
			if (serverPart.indexOf("https://") === 0) {
				serverPart = serverPart.substring(8);
			} else if (serverPart.indexOf("http://") === 0) {
				serverPart = serverPart.substring(7);
			}

			// 分离 server:port
			var colonIndex = serverPart.lastIndexOf(":");
			if (colonIndex < 0) {
				s.innerHTML = "<font style='color:red'><%:Invalid naiveproxy URL format.%></font>";
				return false;
			}

			var server = serverPart.substring(0, colonIndex);
			var port = serverPart.substring(colonIndex + 1);

			// 分离 username:password
			var userColonIndex = userInfo.indexOf(":");
			if (userColonIndex < 0) {
				s.innerHTML = "<font style='color:red'><%:Invalid naiveproxy URL format.%></font>";
				return false;
			}

			var username = userInfo.substring(0, userColonIndex);
			var password = userInfo.substring(userColonIndex + 1);

			// 设置值
			document.getElementsByName('cbid.naived.' + sid + '.type')[0].value = "naiveproxy";
			document.getElementsByName('cbid.naived.' + sid + '.type')[0].dispatchEvent(event);
			document.getElementsByName('cbid.naived.' + sid + '.server')[0].value = server;
			document.getElementsByName('cbid.naived.' + sid + '.server_port')[0].value = port;
			document.getElementsByName('cbid.naived.' + sid + '.username')[0].value = username;
			document.getElementsByName('cbid.naived.' + sid + '.password')[0].value = password;

			if (param != undefined) {
				document.getElementsByName('cbid.naived.' + sid + '.alias')[0].value = decodeURIComponent(param);
			}
			s.innerHTML = "<font style=\'color:green\'><%:Import configuration information successfully.%></font>";
			return false;
		default:
			s.innerHTML = "<font style=\'color:red\'><%:Invalid format.%></font>";
			return false;
		}
	}
//]]>
</script>
<input type="button" class="btn cbi-button cbi-button-apply" value="<%:Import%>" onclick="return import_ssr_url(this, '<%=self.option%>', '<%=self.value%>')" />
<span id="<%=self.option%>-status"></span>
<%+cbi/valuefooter%>
